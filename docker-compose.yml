# qdrant + redis only. the app itself (api/, workers/) runs on the host via
# `uv run`, not in a container - this just gives it the two stateful
# services it needs to talk to on localhost.

services:
  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: nyayai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API - what corpus/uploader.py and corpus/search.py hit
      - "6334:6334"   # gRPC - not used yet, exposed in case a client needs it later
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    container_name: nyayai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # appendonly so queued/in-flight Celery jobs survive a container restart -
    # this is a job queue, losing "task in progress" state on restart is worse
    # than the small disk/perf cost of AOF persistence
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  qdrant_storage:
  redis_data:
