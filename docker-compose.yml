services:
  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: nyayai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API - what corpus/uploader.py and corpus/search.py hit
      - "6334:6334"   # gRPC - not used yet, exposed in case a client needs it later
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s


volumes:
  qdrant_storage:
